<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📈 智能盯盘系统</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: #0f1628;
      --bg-card-hover: #131d35;
      --bg-glass: rgba(15, 22, 40, 0.85);
      --border: rgba(99, 120, 200, 0.15);
      --border-bright: rgba(99, 120, 200, 0.35);
      --accent: #4f8ef7;
      --accent-glow: rgba(79, 142, 247, 0.25);
      --green: #00d48a;
      --green-bg: rgba(0, 212, 138, 0.1);
      --red: #ff5c5c;
      --red-bg: rgba(255, 92, 92, 0.1);
      --yellow: #ffd166;
      --text-primary: #e8edf5;
      --text-secondary: #8896b3;
      --text-muted: #4a5a7a;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      --radius: 16px;
      --radius-sm: 10px;
    }
    [data-theme="light"] {
      --bg-primary: #f0f4ff;
      --bg-card: #ffffff;
      --bg-card-hover: #f8faff;
      --bg-glass: rgba(255,255,255,0.9);
      --border: rgba(79, 142, 247, 0.15);
      --border-bright: rgba(79, 142, 247, 0.35);
      --accent: #3b7de8;
      --accent-glow: rgba(59, 125, 232, 0.15);
      --green: #00aa6e;
      --green-bg: rgba(0, 170, 110, 0.1);
      --red: #e03e3e;
      --red-bg: rgba(224, 62, 62, 0.1);
      --yellow: #d4890c;
      --text-primary: #1a2240;
      --text-secondary: #4a5a7a;
      --text-muted: #8896b3;
      --shadow: 0 8px 32px rgba(79, 142, 247, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }

    /* 顶栏 */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .market-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-secondary);
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .status-dot.open { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.closed { background: var(--text-muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .last-update { font-size: 11px; color: var(--text-muted); }
    .btn-icon {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: all 0.2s; color: var(--text-secondary);
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .btn-text {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 36px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary);
      transition: all 0.2s;
    }
    .btn-text:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .btn-text.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .btn-refresh {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 36px; border-radius: 10px;
      background: var(--accent); border: none; color: #fff;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn-refresh:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-refresh.loading { opacity: 0.7; pointer-events: none; }
    .btn-refresh .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tool-btn {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; font-size: 13px; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .tool-btn:hover, .tool-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    /* 主布局 */
    .container { max-width: 1440px; margin: 0 auto; padding: 24px; }

    /* 摘要卡片行 */
    .summary-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px;
    }
    @media(max-width:1100px){ .summary-row { grid-template-columns: repeat(3, 1fr); } }
    @media(max-width:700px){ .summary-row { grid-template-columns: repeat(2, 1fr); } }

    .summary-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      transition: all 0.3s; position: relative; overflow: hidden;
    }
    .summary-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .summary-card:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: var(--shadow); }
    .summary-card:hover::before { opacity: 1; }
    .card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .card-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .card-value.up { color: var(--green); }
    .card-value.down { color: var(--red); }
    .card-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .card-icon { position: absolute; top: 14px; right: 16px; font-size: 22px; opacity: 0.2; }

    /* 盈亏走势图 */
    .pnl-chart-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
      margin-bottom: 24px;
    }
    .pnl-chart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .pnl-chart-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    #pnl-chart { width: 100%; height: 260px; }

    /* 主内容区 */
    .main-grid {
      display: grid; grid-template-columns: 1fr 380px; gap: 20px; margin-bottom: 20px;
    }
    @media(max-width:1200px){ .main-grid { grid-template-columns: 1fr; } }

    /* 通用卡片 */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-title-icon { font-size: 16px; }
    .card-body { padding: 16px 20px; }

    /* 持仓列表 */
    .stock-list { display: flex; flex-direction: column; gap: 1px; }
    .stock-row {
      display: grid; align-items: center;
      grid-template-columns: 36px 1fr auto auto auto auto;
      gap: 12px; padding: 12px 20px;
      cursor: pointer; transition: background 0.2s;
      border-bottom: 1px solid var(--border);
    }
    .stock-row:last-child { border-bottom: none; }
    .stock-row:hover { background: var(--bg-card-hover); }
    .stock-row.active { background: rgba(79, 142, 247, 0.08); border-left: 3px solid var(--accent); }

    /* 观察列表 - 无持仓列 */
    .watchlist-row {
      display: grid; align-items: center;
      grid-template-columns: 36px 1fr auto auto auto 28px;
      gap: 12px; padding: 10px 20px;
      cursor: pointer; transition: background 0.2s;
      border-bottom: 1px solid var(--border);
    }
    .watchlist-row:last-child { border-bottom: none; }
    .watchlist-row:hover { background: var(--bg-card-hover); }
    .watchlist-row.active { background: rgba(79, 142, 247, 0.08); border-left: 3px solid var(--accent); }
    .watchlist-remove {
      width: 24px; height: 24px; border-radius: 6px; border: none;
      background: transparent; color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.2s;
    }
    .watchlist-remove:hover { background: var(--red-bg); color: var(--red); }

    .stock-rank {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--bg-primary); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: var(--text-muted);
    }
    .stock-info { min-width: 0; }
    .stock-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stock-code { font-size: 11px; color: var(--text-muted); }
    .stock-price { font-size: 15px; font-weight: 700; text-align: right; }
    .stock-pct {
      font-size: 12px; font-weight: 600; padding: 3px 8px;
      border-radius: 6px; text-align: center; min-width: 60px;
    }
    .stock-pct.up { color: var(--green); background: var(--green-bg); }
    .stock-pct.down { color: var(--red); background: var(--red-bg); }
    .stock-signal {
      font-size: 11px; padding: 2px 8px; border-radius: 5px;
      font-weight: 600;
    }
    .signal-buy { background: rgba(0,212,138,0.15); color: var(--green); }
    .signal-hold { background: rgba(255,209,102,0.15); color: var(--yellow); }
    .signal-sell { background: rgba(255,92,92,0.15); color: var(--red); }
    .signal-watch { background: rgba(79,142,247,0.15); color: var(--accent); }

    /* 观察列表折叠 */
    .watchlist-section {
      background: rgba(79, 142, 247, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .watchlist-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
      transition: background 0.2s;
    }
    .watchlist-header:hover { background: var(--bg-card-hover); }
    .watchlist-toggle { font-size: 12px; color: var(--text-muted); transition: transform 0.3s; }
    .watchlist-toggle.collapsed { transform: rotate(-90deg); }
    .watchlist-body { transition: max-height 0.3s ease; overflow: hidden; }
    .watchlist-body.collapsed { max-height: 0 !important; }

    /* K线图区域 */
    .chart-section { padding: 0 0 16px; }
    #kline-chart { width: 100%; height: 400px; }
    #indicator-chart { width: 100%; height: 160px; }

    /* 选股 Tab */
    .tab-bar {
      display: flex; gap: 2px;
      background: var(--bg-primary); border-radius: var(--radius-sm);
      padding: 4px;
    }
    .tab-btn {
      flex: 1; padding: 6px 12px; border-radius: 7px; border: none;
      font-size: 12px; font-weight: 500; cursor: pointer;
      background: transparent; color: var(--text-secondary); transition: all 0.2s;
    }
    .tab-btn.active { background: var(--bg-card); color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    /* 技术指标面板 */
    .indicators-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .indicator-item {
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
    }
    .ind-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .ind-value { font-size: 18px; font-weight: 700; }
    .ind-desc { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }

    /* 市场情绪 */
    .sentiment-bar {
      height: 8px; border-radius: 4px; background: var(--bg-primary);
      overflow: hidden; margin: 8px 0;
    }
    .sentiment-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
    .sentiment-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); }
    .sentiment-item { margin-bottom: 14px; }
    .sentiment-name { font-size: 12px; color: var(--text-secondary); display: flex; justify-content: space-between; }
    .sentiment-pct { font-weight: 600; }

    /* 资金流向 */
    .moneyflow-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .moneyflow-row:last-child { border-bottom: none; }
    .flow-label { color: var(--text-secondary); font-size: 12px; }
    .flow-bar-wrap { flex: 1; margin: 0 12px; height: 4px; background: var(--bg-primary); border-radius: 2px; overflow: hidden; }
    .flow-bar { height: 100%; border-radius: 2px; }
    .flow-val { font-weight: 600; font-size: 12px; min-width: 70px; text-align: right; }

    /* 新闻列表 */
    .news-list { display: flex; flex-direction: column; gap: 0; }
    .news-item {
      padding: 12px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item:hover .news-title { color: var(--accent); }
    .news-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .news-source {
      font-size: 10px; padding: 2px 7px; border-radius: 4px;
      background: var(--accent-glow); color: var(--accent); font-weight: 600;
    }
    .news-time { font-size: 10px; color: var(--text-muted); }
    .news-title { font-size: 13px; line-height: 1.5; color: var(--text-primary); transition: color 0.2s; }

    /* 下方网格 */
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    @media(max-width:1100px){ .bottom-grid { grid-template-columns: 1fr; } }

    /* 加载状态 */
    .loading-skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* 自选股 ticker */
    .ticker-bar {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 16px;
      display: flex; align-items: center; gap: 16px;
      overflow: hidden; margin-bottom: 20px; font-size: 13px;
    }
    .ticker-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; padding-right: 12px; border-right: 1px solid var(--border); }
    .ticker-scroll { display: flex; gap: 24px; overflow-x: auto; scrollbar-width: none; }
    .ticker-scroll::-webkit-scrollbar { display: none; }
    .ticker-item { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .ticker-name { font-weight: 600; }
    .ticker-price { color: var(--text-secondary); }

    /* 信号徽章 */
    .signal-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .signal-badge.strong-buy { background: rgba(0,212,138,0.15); color: var(--green); border: 1px solid rgba(0,212,138,0.3); }
    .signal-badge.buy { background: rgba(0,212,138,0.1); color: var(--green); }
    .signal-badge.hold { background: rgba(255,209,102,0.1); color: var(--yellow); border: 1px solid rgba(255,209,102,0.3); }
    .signal-badge.sell { background: rgba(255,92,92,0.1); color: var(--red); border: 1px solid rgba(255,92,92,0.3); }

    /* 建议详情 */
    .advice-card {
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 12px;
    }
    .advice-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .advice-stock { font-size: 14px; font-weight: 600; }
    .advice-text { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
    .advice-targets { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
    .advice-target { font-size: 11px; }
    .advice-target span { color: var(--text-muted); }
    .advice-target strong { color: var(--text-primary); }

    /* 响应式 */
    @media(max-width:768px) {
      .container { padding: 12px; }
      .stock-row { grid-template-columns: 28px 1fr auto auto; }
      .watchlist-row { grid-template-columns: 28px 1fr auto auto 28px; }
      .stock-signal, .stock-rank { display: none; }
    }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

    /* 模态弹窗 */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); z-index: 200;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--bg-card); border: 1px solid var(--border-bright);
      border-radius: 20px; width: 90vw; max-width: 480px; padding: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal-input {
      width: 100%; padding: 10px 14px; background: var(--bg-primary);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-primary); font-size: 13px; margin-bottom: 10px;
    }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .modal-tabs { display: flex; gap: 0; margin-bottom: 16px; }
    .modal-tab {
      flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); background: var(--bg-primary);
      color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
    }
    .modal-tab:first-child { border-radius: 8px 0 0 8px; }
    .modal-tab:last-child { border-radius: 0 8px 8px 0; }
    .modal-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-cancel {
      padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-primary); color: var(--text-secondary); cursor: pointer;
    }
    .btn-confirm {
      padding: 8px 18px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; cursor: pointer; font-weight: 600;
    }
  </style>
</head>
<body>

<!-- 顶栏 -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo">智能<span>盯盘</span></div>
    <div class="market-status">
      <span class="status-dot" id="market-dot"></span>
      <span id="market-status-text">检测中...</span>
    </div>
    <div class="market-status" style="gap:4px;">
      <span id="current-time" style="font-size:11px;color:var(--text-secondary)"></span>
    </div>
  </div>
  <div class="topbar-right">
    <span class="last-update">上次更新: <span id="last-update-time">--</span></span>
    <button class="btn-text" id="watchlist-toggle-btn" title="切换观察列表" onclick="toggleWatchlist()">
      <span>👁</span> <span>观察列表</span>
    </button>
    <button class="btn-icon" id="theme-btn" title="切换主题" onclick="toggleTheme()">🌙</button>
    <button class="btn-icon" title="配置 API Token" onclick="showTokenModal()" id="token-btn">🔑</button>
    <button class="btn-icon" title="添加股票" onclick="showAddModal()">＋</button>
    <button class="btn-icon" id="auto-refresh-btn" title="自动刷新（当前关闭）" onclick="toggleAutoRefresh()">⏱</button>
    <button class="btn-refresh" id="refresh-btn" onclick="refreshAll()">
      <span id="refresh-icon">⟳</span> 刷新数据
    </button>
  </div>
</header>

<!-- 主内容 -->
<main class="container">

  <!-- Ticker行情 -->
  <div class="ticker-bar">
    <span class="ticker-label">自选持仓</span>
    <div class="ticker-scroll" id="ticker-row"></div>
  </div>

  <!-- 汇总摘要 -->
  <div class="summary-row" id="summary-row">
    <div class="summary-card">
      <div class="card-icon">💼</div>
      <div class="card-label">持仓总市值</div>
      <div class="card-value" id="total-value">--</div>
      <div class="card-sub" id="total-cost">成本: --</div>
    </div>
    <div class="summary-card">
      <div class="card-icon">📈</div>
      <div class="card-label">总盈亏</div>

];

// 多数据源配置（公开可用）
const SINA_API = 'https://hq.sinajs.cn/list=';
const NETEASE_HISTORY = 'https://img1.money.126.net/data';
const API_BASE = 'https://www.codebuddy.cn/v2/tool/financedata';

// CodeBuddy token（可在设置中配置）
let CB_TOKEN = localStorage.getItem('cb-token') || '';

// ============================================================
//  状态管理
// ============================================================
let stocksData = {};      // { code: { ...行情数据 } }
let moneyflowData = {};   // { code: { ...资金流向 } }
let klineData = {};       // { code: { daily/weekly/monthly: [...] } }
let selectedCode = '';

let isDark = true;

let watchlistVisible = true;
let watchlistCollapsed = false;

// ============================================================
//  工具函数
// ============================================================
function fmt(v, d=2) { return v!=null && !isNaN(v) ? parseFloat(v).toFixed(d) : '--'; }
function fmtK(v) {
  if(v==null) return '--';
  v = parseFloat(v);
  if(Math.abs(v) >= 1e8) return (v/1e8).toFixed(2) + '亿';
  if(Math.abs(v) >= 1e4) return (v/1e4).toFixed(2) + '万';
  return v.toFixed(0);
}
function pctClass(v) { return parseFloat(v)>=0 ? 'up' : 'down'; }
function sign(v) { return parseFloat(v)>=0 ? '+' : ''; }
function avg(arr) { return arr.reduce((a,b)=>a+parseFloat(b||0),0)/arr.length; }

function getToday() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${dd}`;
}
function getDateBefore(days) {
  const d = new Date(); d.setDate(d.getDate()-days);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${dd}`;
}
function formatDateDisplay(s) {
  if(!s||s.length<8) return s;
  return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
}

// ============================================================
//  API 调用（CodeBuddy 金融接口，需要 Token）
// ============================================================
async function callApi(api_name, params, fields='') {
  if(!CB_TOKEN) {
    console.warn(`[${api_name}] 未配置 Token，跳过`);
    return null;
  }
  try {
    const resp = await fetch(API_BASE, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization': `Bearer ${CB_TOKEN}`
      },
      body: JSON.stringify({ api_name, params, fields })
    });
    const json = await resp.json();
    if(json.code !== 0) { console.warn(`[${api_name}] 错误:`, json.msg); return null; }
    const { fields: fs, items } = json.data;
    return items.map(row => {
      const obj = {};
      fs.forEach((f, i) => { obj[f] = row[i]; });
      return obj;
    });
  } catch(e) { console.error(`[${api_name}] 请求失败:`, e); return null; }
}

// ============================================================
//  新浪行情代理（公开，实时数据，无需 token）
// ============================================================
async function fetchSinaRealtime(stocks) {
  // 优先使用腾讯行情API（无需跨域代理，更稳定）
  const tencentResult = await fetchTencentRealtime(stocks);
  if(Object.keys(tencentResult).length > 0) return tencentResult;

  // 回退：新浪行情 + 多代理轮换
  const codes = stocks.map(h => (h.market || getMarket(h.code)) + h.code).join(',');
  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent('https://hq.sinajs.cn/list='+codes)}`,
    `https://corsproxy.io/?${encodeURIComponent('https://hq.sinajs.cn/list='+codes)}`,
  ];
  for(const proxy of proxies) {
    try {
      const resp = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
      const text = await resp.text();
      let raw = '';
      try { raw = JSON.parse(text).contents || ''; } catch(e) { raw = text; }
      const results = {};
      raw.split('\n').forEach(line => {
        const m = line.match(/var hq_str_([a-z]{2}\d+)="(.*)"/);
        if(!m) return;
        const fullCode = m[1];
        const code = fullCode.slice(2);
        const parts = m[2].split(',');
        if(parts.length < 32) return;
        results[code] = {
          name: parts[0],
          open: parseFloat(parts[1]),
          pre_close: parseFloat(parts[2]),
          close: parseFloat(parts[3]),
          high: parseFloat(parts[4]),
          low: parseFloat(parts[5]),
          vol: parseFloat(parts[8])/100,
          amount: parseFloat(parts[9])/1000,
          pct_chg: parts[2]>0 ? ((parts[3]-parts[2])/parts[2]*100).toFixed(2) : 0,
          trade_date: parts[30]?.replace(/-/g,''),
        };
      });
      if(Object.keys(results).length > 0) return results;
    } catch(e) { console.warn('代理失败，尝试下一个:', e.message); }
  }
  return {};
}

// 腾讯行情API（无需跨域代理，直接可用）
async function fetchTencentRealtime(stocks) {
  const codes = stocks.map(h => (h.market || getMarket(h.code)) + h.code).join(',');
  const url = `https://qt.gtimg.cn/q=${codes}`;
  try {
    const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const text = await resp.text();
    const results = {};
    text.split(';\n').forEach(line => {
      const m = line.match(/v_([sh|sz]{2}\d+)="(.*)"/);
      if(!m) return;
      const fullCode = m[1];
      const code = fullCode.slice(2);
      const raw = m[2];
      if(!raw) return;
      const parts = raw.split('~');
      if(parts.length < 48) return;
      results[code] = {
        name: parts[1],
        open: parseFloat(parts[5]),
        pre_close: parseFloat(parts[4]),
        close: parseFloat(parts[3]),
        high: parseFloat(parts[33]) || parseFloat(parts[3]),
        low: parseFloat(parts[34]) || parseFloat(parts[3]),
        vol: parseFloat(parts[6])/100,
        amount: parseFloat(parts[37])/1000,
        pct_chg: parseFloat(parts[32]).toFixed(2),
        trade_date: parts[30]?.replace(/-/g,''),
        pe_ttm: parts[39] ? parseFloat(parts[39]) : null,
        turnover_rate: parts[38] ? parseFloat(parts[38]) : null,
        total_mv: parts[45] ? parseFloat(parts[45]) : null,
      };
    });
    return results;
  } catch(e) {
    console.warn('腾讯行情获取失败:', e);
    return {};
  }
}

function getMarket(code) {
  const n = code.replace(/\D/g,'');
  if(n.startsWith('6') || n.startsWith('5') || n.startsWith('11')) return 'sh';
  return 'sz';
}

// 网易历史行情（公开，无需token）
async function fetchNeteaseHistory(code, market, days=120) {
  const prefix = market === 'sh' ? '0' : '1';
  const end = getToday();
  const startD = new Date(); startD.setDate(startD.getDate() - days);
  const start = `${startD.getFullYear()}${String(startD.getMonth()+1).padStart(2,'0')}${String(startD.getDate()).padStart(2,'0')}`;

  const url = `https://img1.money.126.net/data/hs/kline/day/history/${new Date().getFullYear()}/${prefix}${code}.json`;
  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
  ];
  for(const proxy of proxies) {
    try {
      const resp = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
      const text = await resp.text();
      let raw;
      try { raw = JSON.parse(JSON.parse(text).contents || '{}'); } catch(e) { raw = JSON.parse(text); }
      if(!raw.data) continue;
      return raw.data.filter(r => r[0] >= parseInt(start)).map(r => ({
        trade_date: String(r[0]),
        open: r[1], high: r[2], low: r[3], close: r[4],
        pct_chg: r[5], vol: r[7], amount: r[8]/1000,
        pre_close: r[4]/(1+r[5]/100)
      }));
    } catch(e) { console.warn(`历史行情代理失败(${code}):`, e.message); }
  }
  // 最终回退：直接请求网易（可能因CORS失败）
  try {
    const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const raw = await resp.json();
    if(!raw.data) return [];
    return raw.data.filter(r => r[0] >= parseInt(start)).map(r => ({
      trade_date: String(r[0]),
      open: r[1], high: r[2], low: r[3], close: r[4],
      pct_chg: r[5], vol: r[7], amount: r[8]/1000,
      pre_close: r[4]/(1+r[5]/100)
    }));
  } catch(e) {
    console.warn(`网易历史行情全部失败(${code})`);
    return [];
  }
}

// ============================================================
//  加载持仓股票行情（优先新浪实时，历史用网易）
// ============================================================
async function loadStockData() {
  // 先读缓存
  const cacheKey = 'stocks-cache-' + getToday();
  const cached = localStorage.getItem(cacheKey);
  if(cached) {
    try {
      const parsed = JSON.parse(cached);
      Object.assign(stocksData, parsed);
    } catch(e) {}
  }

  // 1. 尝试新浪实时行情（公开）
  const allStocks = [...holdings, ...watchlist];
  const sinaData = await fetchSinaRealtime(allStocks);

  holdings.forEach(h => {
    const rt = sinaData[h.code];
    if(rt) {
      stocksData[h.code] = {
        ...h, ...rt, ts_code: (h.market||getMarket(h.code)) + h.code
      };
    } else {
      stocksData[h.code] = { ...h };
    }
  });

  watchlist.forEach(w => {
    const rt = sinaData[w.code];
    if(rt) {
      stocksData[w.code] = {
        ...w, ...rt, ts_code: (w.market||getMarket(w.code)) + w.code
      };
    } else {
      stocksData[w.code] = { ...w };
    }
  });

  // 2. 尝试 CodeBuddy API 补充基本面数据（需要 token）
  if(CB_TOKEN) {
    const codes = allStocks.map(h => {
      const m = (h.market||getMarket(h.code)).toUpperCase();
      return h.code + '.' + m;
    }).join(',');
    const today = getToday();
    const start = getDateBefore(3);
    const basicRes = await callApi('daily_basic',
      { ts_code: codes, start_date: start, end_date: today },
      'ts_code,trade_date,close,turnover_rate,volume_ratio,pe_ttm,pb,total_mv,circ_mv');
    if(basicRes) {
      const latestBasic = {};
      basicRes.forEach(row => {
        const raw = row.ts_code.split('.')[0];
        if(!latestBasic[raw] || row.trade_date > latestBasic[raw].trade_date) latestBasic[raw] = row;
      });
      allStocks.forEach(h => {
        if(latestBasic[h.code]) Object.assign(stocksData[h.code], latestBasic[h.code]);
      });
    }
  }

  // 保存缓存
  localStorage.setItem(cacheKey, JSON.stringify(stocksData));

  renderStockList();
  renderWatchlist();
  renderTickerRow();
  renderSummary();
  updateHoldingCount();
  renderPnlChart();

  if(!selectedCode && holdings.length > 0) {
    selectStock(holdings[0].code);
  } else if(selectedCode) {
    if(currentPeriod === 'minute') { loadMinuteChart(selectedCode); }
    else { loadKline(selectedCode, currentPeriod); }
    loadMoneyflow(selectedCode);
  }
}

  container.innerHTML = holdings.map((h, idx) => {
    const d = stocksData[h.code] || {};
    const pct = d.pct_chg;
    const cls = pct!=null ? pctClass(pct) : '';

// ============================================================
//  汇总计算
// ============================================================
function renderSummary() {
  let totalCostVal = 0, totalMarket = 0, costCount = 0;
  let bestPct = -Infinity, worstPct = Infinity, bestName='', worstName='';
  let buyCount = 0;

  holdings.forEach(h => {
    const d = stocksData[h.code] || {};
    const close = parseFloat(d.close);
    if(!isNaN(close) && h.shares) {
      totalMarket += close * h.shares;
    }
    if(!isNaN(close) && h.cost && h.shares) {
      totalCostVal += h.cost * h.shares;
      costCount++;
    }
    if(d.pct_chg!=null) {
      if(parseFloat(d.pct_chg) > bestPct) { bestPct = parseFloat(d.pct_chg); bestName = h.name; }
      if(parseFloat(d.pct_chg) < worstPct) { worstPct = parseFloat(d.pct_chg); worstName = h.name; }
    }
    if(getSignal(d).cls === 'buy') buyCount++;
  });

  document.getElementById('total-value').textContent = totalMarket > 0 ? fmtK(totalMarket) + '元' : '--';
  document.getElementById('total-cost').textContent = totalCostVal > 0 ? '成本: ' + fmtK(totalCostVal) + '元' : '未设置成本';
  const pnl = totalMarket - totalCostVal;
  const pnlPct = totalCostVal > 0 ? (pnl/totalCostVal*100) : null;
  const pnlEl = document.getElementById('total-pnl');
  pnlEl.textContent = pnl !== 0 ? (pnl>0?'+':'')+fmtK(pnl)+'元' : '--';
  pnlEl.className = 'card-value ' + (pnl>=0?'up':'down');
  document.getElementById('total-pnl-pct').textContent = pnlPct!=null ? (sign(pnlPct)+fmt(pnlPct))+'%' : '--';

  document.getElementById('best-today').textContent = bestPct !== -Infinity ? sign(bestPct)+fmt(bestPct)+'%' : '--';
  document.getElementById('best-today-code').textContent = bestName;
  document.getElementById('worst-today').textContent = worstPct !== Infinity ? sign(worstPct)+fmt(worstPct)+'%' : '--';
  document.getElementById('worst-today-code').textContent = worstName;
  document.getElementById('buy-signal-count').textContent = buyCount + ' 只';
}

async function loadKline(code, period) {
  if(!klineData[code]) klineData[code] = {};
  if(!klineData[code][period]) {
    const h = holdings.find(s => s.code === code) || watchlist.find(s => s.code === code);
    const market = h ? (h.market || getMarket(code)) : getMarket(code);
    const daysMap = { daily: 120, weekly: 360, monthly: 720 };
    // 网易只有日线，周/月线通过聚合日线实现
    const rawDaily = await fetchNeteaseHistory(code, market, daysMap.daily);
    klineData[code]['daily'] = rawDaily;
    klineData[code]['weekly'] = aggregateKline(rawDaily, 'weekly');
    klineData[code]['monthly'] = aggregateKline(rawDaily, 'monthly');
  }
  renderKlineChart(klineData[code][period], code);
}

function calcMA(closes, n) {
  const result = [];
  for(let i=0; i<closes.length; i++) {
    if(i<n-1) { result.push(null); continue; }
    const sum = closes.slice(i-n+1, i+1).reduce((a,b)=>a+parseFloat(b||0),0);
    result.push(parseFloat((sum/n).toFixed(3)));
  }
  return result;
}

// ============================================================
//  分时线图
// ============================================================
async function loadMinuteChart(code) {
  const h = holdings.find(s => s.code === code);
  const wl = watchlist.find(s => s.code === code);
  const stock = h || wl;
  const market = stock ? (stock.market || getMarket(code)) : getMarket(code);
  const fullCode = market + code;

  const url = `https://web.ifzq.gtimg.cn/appstock/app/minute/query?_var=min_data_${fullCode}&code=${fullCode}`;

  try {
    const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const text = await resp.text();
    const jsonStr = text.replace(/^var\s+\w+\s*=\s*/, '');
    const data = JSON.parse(jsonStr);

    const minuteData = data?.data?.data?.[fullCode]?.data?.data || data?.data?.data || [];
    if(!minuteData || !minuteData.length) {
      renderMinuteChartEmpty(code);
      return;
    }

    const times = [];
    const prices = [];
    const vols = [];
    const avgPrices = [];
    let preClose = null;

    // 提取昨收价
    const stockMinData = data?.data?.data?.[fullCode]?.data;
    if(stockMinData && stockMinData.pre != null) {
      preClose = parseFloat(stockMinData.pre);
    } else if(data?.data?.data?.[fullCode]?.qt?.[fullCode]) {
      const qtArr = data.data.data[fullCode].qt[fullCode];
      if(qtArr && qtArr[4]) preClose = parseFloat(qtArr[4]);
    }

    minuteData.forEach(item => {
      const parts = item.split(',');
      const time = parts[0];
      const price = parseFloat(parts[1]);
      const avgPrice = parseFloat(parts[2]);
      const vol = parseFloat(parts[3]);
      times.push(time.slice(0,2) + ':' + time.slice(2));
      prices.push(price);
      avgPrices.push(avgPrice);
      vols.push(vol);
    });

    renderMinuteChart(times, prices, avgPrices, vols, preClose, code);
  } catch(e) {
    console.warn('分时数据获取失败:', e);
    renderMinuteChartEmpty(code);
  }
}

function renderIndicators(code) {
  const d = stocksData[code] || {};
  const hist = klineData[code]?.daily || [];

  const closes = hist.map(x => parseFloat(x.close));
  const rsi14 = calcRSI(closes, 14);
  const [macd, signal, hist2] = calcMACD(closes);
  const [upper, middle, lower] = calcBoll(closes);

  const items = [
    { label: 'RSI(14)', value: rsi14!=null?fmt(rsi14):'--', desc: rsiDesc(rsi14),
      color: rsi14>70?'var(--red)':rsi14<30?'var(--green)':'var(--text-primary)' },

// ============================================================
//  技术指标计算
// ============================================================
function calcRSI(closes, n=14) {
  if(closes.length < n+1) return null;
  let gains=0, losses=0;
  for(let i=1; i<=n; i++) {
    const diff = closes[i]-closes[i-1];
    if(diff>0) gains+=diff; else losses+=-diff;
  }
  let avgG=gains/n, avgL=losses/n;
  for(let i=n+1; i<closes.length; i++) {
    const diff = closes[i]-closes[i-1];
    avgG = (avgG*(n-1)+(diff>0?diff:0))/n;
    avgL = (avgL*(n-1)+(diff<0?-diff:0))/n;
  }
  if(avgL===0) return 100;
  return 100-(100/(1+avgG/avgL));
}

function calcMACD(closes, fast=12, slow=26, signal=9) {
  if(closes.length < slow+signal) return [null,null,null];
  function ema(data, n) {
    const k=2/(n+1); let e=data[0];
    return data.map((v,i)=>{ if(i===0)return e; e=v*k+e*(1-k); return e; });
  }
  const emaFast = ema(closes, fast);
  const emaSlow = ema(closes, slow);
  const dif = emaFast.map((v,i)=>v-emaSlow[i]);
  const dea = ema(dif, signal);
  const last = closes.length-1;
  return [dif[last]-dea[last], dea[last], dif[last]];
}

function calcBoll(closes, n=20, k=2) {
  if(closes.length < n) return [null,null,null];
  const recent = closes.slice(-n);
  const mid = recent.reduce((a,b)=>a+b,0)/n;
  const std = Math.sqrt(recent.reduce((a,b)=>a+(b-mid)**2,0)/n);
  return [mid+k*std, mid, mid-k*std];
}

// 日线聚合为周线/月线
function aggregateKline(daily, type) {
  if(!daily || !daily.length) return [];
  const grouped = {};
  daily.forEach(d => {
    const dt = String(d.trade_date);
    const date = new Date(parseInt(dt.slice(0,4)), parseInt(dt.slice(4,6))-1, parseInt(dt.slice(6,8)));
    let key;
    if(type === 'weekly') {
      const mon = new Date(date); mon.setDate(date.getDate() - date.getDay() + 1);
      key = `${mon.getFullYear()}${String(mon.getMonth()+1).padStart(2,'0')}${String(mon.getDate()).padStart(2,'0')}`;
    } else {
      key = dt.slice(0,6) + '01';
    }
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  });
  return Object.entries(grouped).sort((a,b)=>a[0]>b[0]?1:-1).map(([key, bars]) => ({
    trade_date: key,
    open: bars[0].open,
    high: Math.max(...bars.map(b=>b.high)),
    low: Math.min(...bars.map(b=>b.low)),
    close: bars[bars.length-1].close,
    vol: bars.reduce((s,b)=>s+parseFloat(b.vol||0),0),
    pct_chg: ((bars[bars.length-1].close - bars[0].open)/bars[0].open*100).toFixed(2),
  }));
}

// ============================================================
//  AI 购买建议（增强版）
// ============================================================
function getSignal(d) {
  const hist = klineData[d.ts_code||d.code]?.daily || [];
  const closes = hist.map(x => parseFloat(x.close));
  const vols = hist.map(x => parseFloat(x.vol||0));
  const rsi = calcRSI(closes, 14);
  const [macd, sigLine] = calcMACD(closes);
  const [upper, mid, lower] = calcBoll(closes);
  const pct = parseFloat(d.pct_chg||0);

  let score = 0;

  // 原有维度
  if(rsi!=null && rsi<40) score++;
  if(rsi!=null && rsi<30) score++;
  if(macd!=null && macd>0) score++;
  if(pct < -3) score++;
  if(d.pb!=null && parseFloat(d.pb)<1) score++;
  if(d.pe_ttm!=null && parseFloat(d.pe_ttm)>0 && parseFloat(d.pe_ttm)<15) score++;

  // 新增维度
  // 1. MACD金叉（MACD线上穿信号线）
  if(macd!=null && sigLine!=null && macd > sigLine) score++;
  // 2. 均线多头排列（MA5 > MA10 > MA20）
  if(closes.length >= 20) {
    const ma5 = avg(closes.slice(-5));
    const ma10 = avg(closes.slice(-10));
    const ma20 = avg(closes.slice(-20));
    if(ma5 > ma10 && ma10 > ma20) score++;
  }
  // 3. 价格在布林中轨以上
  if(mid!=null && closes.length && closes[closes.length-1] > mid) score++;
  // 4. 成交量放大（最近5日均量 > 之前20日均量 * 1.3）
  if(vols.length >= 25) {
    const recentVol = avg(vols.slice(-5));
    const prevVol = avg(vols.slice(-25,-5));
    if(recentVol > prevVol * 1.3) score++;
  }
  // 5. 连续3天上涨
  if(closes.length >= 4) {
    const last3 = closes.slice(-3);
    if(last3[0] < last3[1] && last3[1] < last3[2]) score++;
  }

  // 减分项
  // 1. RSI超买
  if(rsi!=null && rsi > 70) score -= 2;
  // 2. MACD死叉
  if(macd!=null && sigLine!=null && macd < sigLine) score--;
  // 3. 连续3天下跌
  if(closes.length >= 4) {
    const last3 = closes.slice(-3);
    if(last3[0] > last3[1] && last3[1] > last3[2]) score--;
  }

  if(score >= 5) return { cls:'buy', label:'强买入' };
  if(score >= 3) return { cls:'buy', label:'建议买入' };
  if(score >= 1) return { cls:'hold', label:'持有观望' };
  if(score >= 0) return { cls:'watch', label:'关注' };
  return { cls:'sell', label:'注意风险' };
}

function renderAdvice(code) {
  const section = document.getElementById('advice-section');
  const d = stocksData[code] || {};
  const h = holdings.find(s => s.code === code) || watchlist.find(s => s.code === code) || {};
  const hist = klineData[code]?.daily || [];
  const closes = hist.map(x => parseFloat(x.close));
  const rsi = calcRSI(closes, 14);
  const [macd, sigLine] = calcMACD(closes);
  const [upper, mid, lower] = calcBoll(closes);
  const signal = getSignal({...d, code});

  const close = parseFloat(d.close);
  const stopLoss = close ? (close * 0.93).toFixed(2) : '--';
  const target1 = close ? (close * 1.08).toFixed(2) : '--';
  const target2 = close ? (close * 1.15).toFixed(2) : '--';

  const bullets = [];
  if(rsi!=null) {
    if(rsi < 30) bullets.push('RSI 处于超卖区（'+fmt(rsi)+'），反弹概率上升');
    else if(rsi > 70) bullets.push('RSI 超买（'+fmt(rsi)+'），注意回调风险');
    else bullets.push('RSI 处于中性区间（'+fmt(rsi)+'），趋势不明朗');
  }
  if(macd!=null) {
    if(macd > sigLine) bullets.push('MACD 金叉，短期偏多');
    else bullets.push('MACD 死叉，短期偏空');
  }
  if(mid!=null && close) {
    if(close < lower) bullets.push('价格跌破布林下轨，超跌反弹机会');
    else if(close > upper) bullets.push('价格突破布林上轨，注意追高风险');
  }
  if(d.turnover_rate) {
    if(parseFloat(d.turnover_rate) > 5) bullets.push('换手率偏高（'+d.turnover_rate+'%），市场关注度高');
  }
  if(d.pe_ttm) {
    if(parseFloat(d.pe_ttm) < 15 && parseFloat(d.pe_ttm) > 0) bullets.push('PE(TTM)='+fmt(d.pe_ttm)+'，估值偏低');
  }
  // 均线排列
  if(closes.length >= 20) {
    const ma5 = avg(closes.slice(-5));
    const ma10 = avg(closes.slice(-10));
    const ma20 = avg(closes.slice(-20));
    if(ma5 > ma10 && ma10 > ma20) bullets.push('均线多头排列（MA5>MA10>MA20），趋势向好');
    else if(ma5 < ma10 && ma10 < ma20) bullets.push('均线空头排列（MA5<MA10<MA20），趋势偏弱');
  }
  // 成交量
  const vols = hist.map(x => parseFloat(x.vol||0));
  if(vols.length >= 25) {
    const recentVol = avg(vols.slice(-5));
    const prevVol = avg(vols.slice(-25,-5));
    if(recentVol > prevVol * 1.3) bullets.push('近期成交量明显放大，关注度提升');
  }
  if(h.cost && close) {
    const costPct = ((close - h.cost)/h.cost*100).toFixed(1);
    bullets.push(`当前亏损/盈利：${sign(costPct)}${costPct}%（成本 ${h.cost}）`);
  }

  const badgeCls = {buy:'strong-buy',hold:'hold',sell:'sell',watch:'buy'}[signal.cls] || 'hold';

  section.innerHTML = `
    <div class="advice-card">
      <div class="advice-header">
        <span class="advice-stock">${h.name || code}</span>
        <span class="signal-badge ${badgeCls}">
          ${{buy:'📈',hold:'⚖️',sell:'⚠️',watch:'👁️'}[signal.cls]} ${signal.label}
        </span>
      </div>
      <div class="advice-text">
        <ul style="padding-left:16px;display:flex;flex-direction:column;gap:4px;">
          ${bullets.map(b=>`<li>${b}</li>`).join('')}
          ${!bullets.length ? '<li style="color:var(--text-muted)">数据加载中，请稍候...</li>' : ''}
        </ul>
      </div>
      <div class="advice-targets">
        <div class="advice-target"><span>止损价</span> <strong style="color:var(--red)">${stopLoss}</strong></div>
        <div class="advice-target"><span>目标1</span> <strong style="color:var(--green)">${target1}</strong></div>
        <div class="advice-target"><span>目标2</span> <strong style="color:var(--green)">${target2}</strong></div>
        ${h.cost?`<div class="advice-target"><span>持仓成本</span> <strong>${fmt(h.cost)}</strong></div>`:''}
      </div>
    </div>
    <div style="font-size:11px;color:var(--text-muted);padding:8px 0;text-align:center;">
      本建议基于技术分析，仅供参考，不构成投资建议
    </div>`;
}

        const parts = m[2].split(',');
        indexData[m[1]] = { close: parseFloat(parts[1]), pct_chg: parseFloat(parts[3]) };
      });
    } catch(e) { console.warn('大盘指数获取失败'); }
  }

  section.innerHTML = indices.map(idx => {
    const d = indexData[idx.code];
    if(!d || isNaN(d.close)) return `<div class="moneyflow-row"><span class="flow-label">${idx.name}</span><span style="color:var(--text-muted)">--</span></div>`;
    const pct = d.pct_chg||0;
    return `<div class="moneyflow-row">
      <span class="flow-label">${idx.name}</span>
      <div style="flex:1;margin:0 8px;text-align:right;font-size:13px;font-weight:600;">${fmt(d.close)}</div>
      <span class="stock-pct ${pctClass(pct)}" style="min-width:52px;">${sign(pct)}${fmt(pct)}%</span>
    </div>`;
  }).join('');
}

// ============================================================
//  北向资金（需要 Token，否则显示提示）
// ============================================================

// ============================================================

async function loadNews() {
  const section = document.getElementById('news-section');

  if(!CB_TOKEN) {
    section.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:12px;">
      配置 CodeBuddy Token 后可查看财经新闻快讯
      <br><button onclick="showTokenModal()" style="margin-top:8px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">配置 Token</button>
    </div>`;
    return;
  }

  const now = new Date();
  const end = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:00`;
  const startD = new Date(now - 4*60*60*1000);
  const start = `${startD.getFullYear()}-${String(startD.getMonth()+1).padStart(2,'0')}-${String(startD.getDate()).padStart(2,'0')} ${String(startD.getHours()).padStart(2,'0')}:${String(startD.getMinutes()).padStart(2,'0')}:00`;

  const res = await callApi('news', { src: 'cls', start_date: start, end_date: end });

  if(!res || !res.length) {
    section.innerHTML = `<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px;">暂无最新资讯</div>`;
    return;
  }

  const items = res.slice(0, 12);
  section.innerHTML = `<div class="news-list">${items.map(n => {
    const title = n.title || n.content?.slice(0,80) || '无标题';
    const time = n.datetime ? n.datetime.slice(11,16) : '';
    return `<div class="news-item">
      <div class="news-meta">
        <span class="news-source">财联社</span>
        <span class="news-time">${time}</span>
      </div>
      <div class="news-title">${title}</div>
    </div>`;

}

// ============================================================
//  持仓管理
// ============================================================
function loadHoldings() {
  const saved = localStorage.getItem('stock-holdings');
  if(saved) {
    try {
      holdings = JSON.parse(saved);
      // 检查是否是旧版空数据（没有cost字段或数量为0），自动升级
      if(holdings.length > 0 && !holdings[0].cost && DEFAULT_STOCKS.length > 0 && DEFAULT_STOCKS[0].cost) {
        const needsUpgrade = holdings.some(h => !h.cost && DEFAULT_STOCKS.find(d => d.code === h.code && d.cost));
        if(needsUpgrade) {
          holdings = DEFAULT_STOCKS.map(s => ({...s}));
          saveHoldings();
          console.log('持仓数据已升级为含成本版本');
        }
      }
      // 如果持仓列表为空但默认列表有数据，使用默认
      if(holdings.length === 0 && DEFAULT_STOCKS.length > 0) {
        holdings = DEFAULT_STOCKS.map(s => ({...s}));
        saveHoldings();
      }
      return;
    } catch(e) {}
  }
  holdings = DEFAULT_STOCKS.map(s => ({...s}));
  saveHoldings();
}

function saveHoldings() {
  localStorage.setItem('stock-holdings', JSON.stringify(holdings));
}

// ============================================================
//  添加股票弹窗
// ============================================================
function switchAddTab(mode) {
  addMode = mode;
  document.getElementById('tab-holding').classList.toggle('active', mode === 'holding');
  document.getElementById('tab-watchlist').classList.toggle('active', mode === 'watchlist');
  document.getElementById('add-holding-fields').style.display = mode === 'holding' ? '' : 'none';
  document.getElementById('add-watchlist-fields').style.display = mode === 'watchlist' ? '' : 'none';
}

function showAddModal() {
  document.getElementById('add-modal').classList.add('show');
  if(addMode === 'holding') {
    document.getElementById('modal-code').focus();
  } else {
    document.getElementById('modal-wl-code').focus();
  }
}
function hideAddModal() {
  document.getElementById('add-modal').classList.remove('show');
  ['modal-code','modal-name','modal-cost','modal-shares','modal-wl-code','modal-wl-name'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
}
function addStock() {
  if(addMode === 'holding') {
    const rawCode = document.getElementById('modal-code').value.trim().toUpperCase();
    if(!rawCode) return;
    let code = rawCode, market = null;
    if(rawCode.includes('.')) {
      const parts = rawCode.split('.');
      code = parts[0];
      market = parts[1].toLowerCase();
    } else {
      market = getMarket(code);
    }
    const name = document.getElementById('modal-name').value.trim() || code;
    const cost = parseFloat(document.getElementById('modal-cost').value) || null;
    const shares = parseInt(document.getElementById('modal-shares').value) || null;
    if(holdings.find(h => h.code === code)) { alert('该股票已在持仓列表中'); return; }
    holdings.push({ code, name, cost, shares, market });
    saveHoldings();
  } else {
    const rawCode = document.getElementById('modal-wl-code').value.trim().toUpperCase();
    if(!rawCode) return;
    let code = rawCode, market = null;
    if(rawCode.includes('.')) {
      const parts = rawCode.split('.');
      code = parts[0];
      market = parts[1].toLowerCase();
    } else {
      market = getMarket(code);
    }
    const name = document.getElementById('modal-wl-name').value.trim() || code;
    if(watchlist.find(w => w.code === code)) { alert('该股票已在观察列表中'); return; }
    watchlist.push({ code, name, market });
    saveWatchlist();
  }
  hideAddModal();
  loadStockData();
}

// Token 配置弹窗
function showTokenModal() {
  const token = prompt('请输入 CodeBuddy Token（获取方式：WorkBuddy → 设置 → API Key）：', CB_TOKEN);
  if(token !== null) {
    CB_TOKEN = token.trim();
    localStorage.setItem('cb-token', CB_TOKEN);
    refreshAll();
  }
}

// ============================================================
//  每日盈亏自动记录
// ============================================================
function recordDailyPnl() {
  let totalMarket = 0, totalCost = 0;
  holdings.forEach(h => {
    const d = stocksData[h.code] || {};
    const close = parseFloat(d.close);
    if(!isNaN(close) && h.shares) totalMarket += close * h.shares;
    if(!isNaN(close) && h.cost && h.shares) totalCost += h.cost * h.shares;
  });
  if(totalMarket <= 0) return;

  const history = JSON.parse(localStorage.getItem('pnl-history') || '[]');
  const today = getToday();
  const entry = { date: today, totalMarket: Math.round(totalMarket), totalCost: Math.round(totalCost) };
  const idx = history.findIndex(h => h.date === today);
  if(idx >= 0) history[idx] = entry;
  else history.push(entry);
  // 最多保留180天
  while(history.length > 180) history.shift();
  localStorage.setItem('pnl-history', JSON.stringify(history));
}

// ============================================================
//  主题切换
// ============================================================
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  document.body.removeAttribute('style');
  // 重绘图表
  klineData = {};
  if(selectedCode) {
    if(currentPeriod === 'minute') { loadMinuteChart(selectedCode); }
    else { loadKline(selectedCode, currentPeriod); }
  }
  renderPnlChart();
}

// ============================================================
//  时钟 & 市场状态
// ============================================================
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  document.getElementById('current-time').textContent =
    now.toLocaleDateString('zh-CN') + ' ' + now.toLocaleTimeString('zh-CN');

  // A股交易时间：9:30-11:30, 13:00-15:00（周一至周五）
  const day = now.getDay();
  const mins = h*60+m;
  const isWeekday = day>=1 && day<=5;
  const isTradingHour = (mins>=570&&mins<=690) || (mins>=780&&mins<=900);
  const isOpen = isWeekday && isTradingHour;

  const dot = document.getElementById('market-dot');
  const text = document.getElementById('market-status-text');
  dot.className = 'status-dot ' + (isOpen ? 'open' : 'closed');
  text.textContent = isOpen ? 'A股开盘中' : (isWeekday ? '已收盘' : '休市');
}

// ============================================================
//  全量刷新
// ============================================================
async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.classList.add('loading');
  icon.className = 'spin';
  icon.textContent = '⟳';

  stocksData = {};
  klineData = {};
  moneyflowData = {};
  selectedCode = '';

  await Promise.all([
    loadStockData(),
    loadSentiment(),
    loadIndexSection(),
    loadNorthbound(),
    loadNews(),
  ]);

  // 记录每日盈亏
  recordDailyPnl();
  // 刷新盈亏走势图
  renderPnlChart();

  document.getElementById('last-update-time').textContent = new Date().toLocaleTimeString('zh-CN');
  btn.classList.remove('loading');
  icon.className = '';
  icon.textContent = '⟳';
}

// ============================================================
//  自动定时刷新
// ============================================================
let autoRefreshInterval = null;
let autoRefreshEnabled = false;
let autoRefreshCountdown = 30;

function toggleAutoRefresh() {
  autoRefreshEnabled = !autoRefreshEnabled;
  const btn = document.getElementById('auto-refresh-btn');
  if(autoRefreshEnabled) {
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    btn.title = '自动刷新（已开启，30秒）';
    autoRefreshCountdown = 30;
    autoRefreshInterval = setInterval(() => {
      autoRefreshCountdown--;
      btn.title = `自动刷新（${autoRefreshCountdown}秒后刷新）`;
      if(autoRefreshCountdown <= 0) {
        autoRefreshCountdown = 30;
        refreshAll();
      }
    }, 1000);
  } else {
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.title = '自动刷新（当前关闭）';
    if(autoRefreshInterval) { clearInterval(autoRefreshInterval); autoRefreshInterval = null; }
  }
}

// ============================================================
//  K线画线工具
// ============================================================
let drawMode = null; // null, 'hline', 'trendline'
let drawings = {}; // { code: [{ type, data }] }

function setDrawMode(mode) {
  if(drawMode === mode) { drawMode = null; }
  else { drawMode = mode; }
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  if(drawMode) {
    const btns = document.querySelectorAll('.tool-btn');
    btns.forEach(b => {
      if((drawMode === 'hline' && b.title === '画水平线') || (drawMode === 'trendline' && b.title === '画趋势线')) b.classList.add('active');
    });
  }
  // 趋势线暂未完全实现，提示用户
  if(mode === 'trendline') {
    alert('趋势线功能开发中，暂仅支持水平线画线');
    drawMode = null;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  }
}

function clearDrawings() {
  const code = selectedCode;
  drawings[code] = [];
  if(currentPeriod === 'minute') { loadMinuteChart(code); }
  else { loadKline(code, currentPeriod); }
}

function handleChartClick(params, chart, code) {
  if(!drawMode) return;
  const pointInPixel = [params.offsetX, params.offsetY];
  const pointInGrid = chart.containPixel('grid', pointInPixel);
  if(!pointInGrid) return;

  const yValue = chart.convertFromPixel({seriesIndex: 0}, pointInPixel)[1];

  if(!drawings[code]) drawings[code] = [];

  if(drawMode === 'hline') {
    drawings[code].push({ type: 'hline', value: parseFloat(yValue.toFixed(2)) });
    applyDrawings(chart, code);
    drawMode = null;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  }
}

function applyDrawings(chart, code) {
  if(!drawings[code] || !drawings[code].length) return;

  const markLineData = [];
  drawings[code].forEach(d => {
    if(d.type === 'hline') {
      markLineData.push({
        yAxis: d.value,
        lineStyle: { type: 'dashed', color: '#ff9f43', width: 1.5 },
        label: { show: true, formatter: d.value.toFixed(2), position: 'end', color: '#ff9f43', fontSize: 10 }
      });
    }
  });

  if(markLineData.length > 0) {
    chart.setOption({
      series: [{ markLine: { silent: true, symbol: 'none', data: markLineData } }]
    });
  }
}

// ============================================================
//  初始化
// ============================================================
async function init() {
  loadHoldings();
  loadWatchlistData();
  updateClock();
  setInterval(updateClock, 1000);
  await refreshAll();
}

init();
